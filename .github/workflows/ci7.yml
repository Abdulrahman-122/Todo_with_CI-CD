name: Make_artifact
on:
  push: 
  pull_request:
jobs:
  Create_artifact:
    runs-on: ubuntu-latest
    steps:
      - name: checkout+upload_artifact
        uses: actions/checkout@v4
      - run: zip -r source.zip . 

      - uses: actions/upload-artifact@v4
        with:
          name: project-source
          path: source.zip
