name: check_CVEs
on:
  push:
  pull_request: 

jobs:
  Check:  
    runs-on: ubuntu-latest
    steps:
      - name: Get_checkout_Repo
        uses: actions/checkout@v4
      - name: Get_setup_python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pip install pip-audit
        continue-on-error: true
      - run: pip-audit

