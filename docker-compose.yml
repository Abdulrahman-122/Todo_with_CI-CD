services:
  db:
    image: postgres:15.1-alpine
    environment:
     POSTGRES_PASSWORD: 123Sest
     POSTGRES_DB: Dest
     POSTGRES_USER: test
    networks:
      - todo
    ports: 
     - "5432:5432"
    volumes: 
      - todo:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD","pg_isready", "-U", "test","-d","Dest"]
      interval: 10s
      timeout: 5s
      retries: 5
  fastapi:
    build: .
    depends_on:
       db:
         condition: service_healthy
    networks:
      - todo
    ports: 
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://test:123Sest@db:5432/Dest
      SECRET_KEY: 1664855201381eaa39885c0fa6cb190359590be0109eec14b0919614936cb56d
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

volumes:
  todo:

networks:
  todo:
    driver: bridge
    