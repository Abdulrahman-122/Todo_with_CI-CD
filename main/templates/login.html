{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow p-4">
            <h3 class="text-center mb-3">Login</h3>
<div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="your email">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="your password">
            </div>
            <button class="btn btn-success w-100" onclick="login()">Login</button>
	        <p class="text-danger text-center mt-3" id="message"></p>
            <a  href="/register">Forget Password</a>    

        </div>
    </div>
</div>
<script src="/static/js/login.js"></script>
{% endblock %}
