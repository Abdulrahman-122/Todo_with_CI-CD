{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow p-4">

        <h2>Settings</h2>

        <hr>

        <div class="mb-3">
            <label class="form-label">
                Application Version
            </label>

            <input
                class="form-control"
                value="v1.0.0"
                readonly
            >
        </div>

        <div class="mb-3">
            <label class="form-label">
                Authentication
            </label>

            <input
                class="form-control"
                value="JWT Bearer Token"
                readonly
            >
        </div>

        <div class="mb-3">
            <label class="form-label">
                Database
            </label>

            <input
                class="form-control"
                value="PostgreSQL"
                readonly
            >
        </div>

        <button
            class="btn btn-danger"
            onclick="logout()"
        >
            Logout
        </button>

    </div>

</div>

<script>
function logout() {
    localStorage.removeItem("token");
    window.location.href = "/";
}
</script>

{% endblock %}
