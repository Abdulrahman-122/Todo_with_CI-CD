<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My App{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">TodoApp</a>

    <div class="d-flex">
      {% if user  %}
        <a class="btn btn-warning" href="/todos-page">Todos</a>    
        <a class="btn btn-warning" href="/about">About</a>
        <a class="btn btn-warning" href="/settings">Settings</a>
        <a class="btn btn-danger" href="/">Logout</a>
      {% else %}
        <a class="btn btn-outline-light  me-2" href="/register">Register</a>
        <a class="btn btn-outline-light me-2" href="/">Login</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
